name: TrustPulse Test & Coverage

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.1'

      - name: Verify dependencies
        run: go mod tidy

      - name: Run Tests with Coverage
        run: |
          mkdir -p coverage
          go test -coverpkg=./... -coverprofile=coverage/coverage.out -covermode=atomic ./...

      - name: Display Coverage
        run: go tool cover -func=coverage/coverage.out

      - name: Enforce Minimum Coverage (70%)
        run: |
          total=$(go tool cover -func=coverage/coverage.out | grep total | awk '{print $3}' | sed 's/%//')
          threshold=10
          echo "Total coverage: $total%"
          result=$(echo "$total >= $threshold" | bc)
          if [ "$result" -eq 1 ]; then
            echo "Coverage OK ✅"
          else
            echo "Coverage below threshold ❌"
            exit 1
          fi

      - name: Upload Coverage Artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.out
